<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Convite Sophia - 1 Aninho</title>

<style>
:root {
    --cor-botao-x: #ff66c4; 
    --cor-botao-som: #ff66c4; 
}

body, html { 
    margin: 0; 
    padding: 0; 
    width: 100%; 
    height: 100dvh;
    overflow: hidden; 
    background: #000; 
}

/* TELAS */
.page {
    position: fixed;
    top: 0; left: 0;
    width: 100%; 
    height: 100dvh;
    display: none;
    justify-content: center;
    align-items: center;
}

.active { display: flex; }

/* IMAGEM */
.media-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.art-bg {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none; /* LIBERA CLIQUE */
}

/* BOTÃO ÁUDIO */
.btn-audio {
    position: fixed;

    top: calc(env(safe-area-inset-top) + 40px); /* 👈 ajustado pra descer */
    left: 25px;

    width: 45px;
    height: 45px;
    background-color: var(--cor-botao-som);
    color: white;
    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;
    z-index: 9999;
    border: none;
    font-size: 20px;
}

/* HOTSPOTS */
.hotspot-area {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    aspect-ratio: 9 / 16;
}

.hotspot-container {
    position: absolute;
    bottom: 45%; /* 👈 AJUSTE AQUI */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    width: 75%;
    gap: 10%;
}

.hotspot {
    width: 70px;
    height: 70px;
    border-radius: 50%;

    background: transparent;
    cursor: pointer;
    border: none;
}

/* BOTÃO X */
.btn-x {
    position: absolute;

    top: calc(env(safe-area-inset-top) + 40px); /* 👈 MESMA ALTURA */
    right: 25px;

    width: 50px;
    height: 50px;
    background-color: var(--cor-botao-x);
    color: white;
    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;
    border: none;
    font-size: 22px;

    animation: float 3s ease-in-out infinite;
    z-index: 9999;
}

/* ANIMAÇÃO SUAVE */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-4px); }
    100% { transform: translateY(0px); }
}

.btn-x:active {
    transform: scale(0.9);
}
</style>
</head>

<body onclick="iniciarAudioAutomatico()">

<audio id="musica" loop playsinline>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<button class="btn-audio" onclick="toggleAudio(event)" id="audioControl">🔊</button>

<!-- PÁGINA PRINCIPAL -->
<div id="principal" class="page active">
    <div class="media-wrapper">
        <img src="pagina.png" class="art-bg">

        <div class="hotspot-area">
            <div class="hotspot-container">

                <div class="hotspot"
                onclick="vibrar(); window.open('https://wa.me/5551991224472?text=Olá%20gostaria%20de%20confirmar%20minha%20presença%20no%20aniversário%20da%20Sophia!')">
                </div>

                <div class="hotspot"
                onclick="vibrar(); window.open('https://maps.app.goo.gl/859PChTEDadoassk9')">
                </div>

                <div class="hotspot"
                onclick="vibrar(); irParaSugestao()">
                </div>

            </div>
        </div>
    </div>
</div>

<!-- PÁGINA 2 -->
<div id="sugestao" class="page">
    <div class="media-wrapper">
        <img src="pagina2.png" class="art-bg">
        <button class="btn-x" onclick="irParaPrincipal()">✕</button>
    </div>
</div>

<script>
const audio = document.getElementById('musica');
const btnAudio = document.getElementById('audioControl');
let audioIniciado = false;

/* ÁUDIO */
function iniciarAudioAutomatico() {
    if (!audioIniciado) {
        audio.play().catch(() => {});
        audioIniciado = true;
    }
}

function toggleAudio(event) {
    event.stopPropagation();
    if (audio.paused) {
        audio.play();
        btnAudio.innerHTML = "🔊";
    } else {
        audio.pause();
        btnAudio.innerHTML = "🔇";
    }
}

/* VIBRAÇÃO */
function vibrar() {
    if (navigator.vibrate) {
        navigator.vibrate([30, 50, 30]);
    }
}

/* NAVEGAÇÃO */
function irParaSugestao() {
    document.getElementById('principal').classList.remove('active');
    document.getElementById('sugestao').classList.add('active');
}

function irParaPrincipal() {
    document.getElementById('sugestao').classList.remove('active');
    document.getElementById('principal').classList.add('active');
}
</script>

</body>
</html>
