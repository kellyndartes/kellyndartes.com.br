<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Convite Sophia - 1 Aninho</title>

<meta property="og:title" content="Convite Sophia 💖">
<meta property="og:description" content="Toque para abrir o convite">
<meta property="og:image" content="capalink.png">

<style>
body, html { 
    margin: 0; 
    padding: 0; 
    width: 100%; 
    height: 100dvh;
    overflow: hidden; 
    background: #000; 
}

/* TELAS */
.page {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%; 
    height: 100dvh;
    display: none;
    justify-content: center;
    align-items: center;
}

.active { display: flex; }

/* WRAPPER */
.media-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
}

/* IMAGEM / VIDEO */
.art-bg,
.video-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

/* BOTÃO CAPA (SUBI ELE) */
.btn-start {
    position: absolute;
    bottom: 36%; /* 👈 antes era 20% */
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    cursor: pointer;
}

/* HOTSPOTS */
.hotspot {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    background: transparent;
    transition: transform 0.2s ease;
}

/* BOTÕES DO VÍDEO */
.btn1 {
    bottom: 35%;
    left: 16%;
    width: 80px;
    height: 80px;
}

.btn2 {
    bottom: 35%;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 80px;
}

.btn3 {
    bottom: 35%;
    right: 18%;
    width: 80px;
    height: 80px;
}

/* CLIQUE */
.btn1:active,
.btn3:active {
    transform: scale(0.95);
}

.btn2:active {
    transform: translateX(-50%) scale(0.95);
}

/* BOTÃO VOLTAR */
.btn-x {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 50px);
    right: 25px;
    width: 50px;
    height: 50px;
    background-color: #ff66c4;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    font-size: 22px;
    z-index: 9999;
}

.btn-x:active {
    transform: scale(0.9);
}
</style>
</head>

<body>

<!-- CAPA -->
<div id="capa" class="page active">
    <div class="media-wrapper">
        <img src="capa.png" class="art-bg">
        <div class="btn-start" onclick="abrirVideo()"></div>
    </div>
</div>

<!-- VÍDEO -->
<div id="videoPage" class="page">
    <div class="media-wrapper">
        <video id="videoConvite" class="video-bg" playsinline webkit-playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>

        <!-- BOTÕES -->
        <div class="hotspot btn1"
        onclick="window.open('https://kellyndartes.com.br/formulariosophia/', '_blank')"></div>

        <div class="hotspot btn2"
        onclick="window.open('https://maps.app.goo.gl/859PChTEDadoassk9', '_blank')"></div>

        <div class="hotspot btn3"
        onclick="irParaSugestao()"></div>
    </div>
</div>

<!-- PRESENTES -->
<div id="sugestao" class="page">
    <div class="media-wrapper">
        <img src="pagina.png" class="art-bg">
        <button class="btn-x" onclick="voltarParaVideo()">✕</button>
    </div>
</div>

<script>
const video = document.getElementById('videoConvite');

/* CAPA → VÍDEO */
function abrirVideo() {
    document.getElementById('capa').classList.remove('active');
    document.getElementById('videoPage').classList.add('active');

    video.currentTime = 0;
    video.play();
}

/* VÍDEO → PRESENTES */
function irParaSugestao() {
    document.getElementById('videoPage').classList.remove('active');
    document.getElementById('sugestao').classList.add('active');
    video.pause();
}

/* VOLTAR PARA VÍDEO */
function voltarParaVideo() {
    document.getElementById('sugestao').classList.remove('active');
    document.getElementById('videoPage').classList.add('active');

    video.play();
}
</script>

</body>
</html>
