<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script>
/* =====================================================
   EDITAR AQUI - CONFIGURAÇÃO DO CONVITE
   MEXA SÓ NESTE BLOCO
===================================================== */
const CONFIG = {
    /* TÍTULO DO NAVEGADOR E DO CAPALINK */
    titulo: "Convite Sophia - 1 Aninho",
    descricao: "Toque para abrir o convite 💖",

    /* IMAGEM DO PREVIEW DO LINK */
    capalink: "capalink.png",

    /* ARQUIVOS DAS PÁGINAS */
    paginaPrincipal: "pagina.png",
    paginaPresentes: "pagina2.png",

    /* ÁUDIO */
    audio: "audio.mp3",
    volumeInicial: 0.6,

    /* LINK DO BOTÃO DE LOCALIZAÇÃO */
    linkLocalizacao: "https://maps.app.goo.gl/RTEsPySm4iWZiz6s9",

    /* COR DO BOTÃO DE SOM */
    corBotaoSom: "#ff66c4",

    /* COR DO BOTÃO VOLTAR */
    corBotaoVoltar: "#ff66c4",

    /* POSIÇÃO DO BOTÃO DE SOM */
    botaoSom: {
        top: "calc(env(safe-area-inset-top) + 40px)",
        left: "25px",
        width: "50px",
        height: "50px",
        fontSize: "22px"
    },

    /* POSIÇÃO DO BOTÃO VOLTAR */
    botaoVoltar: {
        top: "calc(env(safe-area-inset-top) + 40px)",
        right: "25px",
        width: "50px",
        height: "50px",
        fontSize: "22px"
    },

    /* TAMANHO DA ÁREA BASE DA ARTE */
    areaBase: {
        maxWidth: "420px",
        maxHeight: "750px"
    },

    /* BOTÃO 1 - LOCALIZAÇÃO */
    botao1: {
        bottom: "33%",
        left: "26%",
        width: "90px",
        height: "90px"
    },

    /* BOTÃO 2 - PRESENTES */
    botao2: {
        bottom: "33%",
        left: "56%",
        width: "90px",
        height: "90px"
    }
};
</script>

<title id="pageTitle"></title>

<!-- CAPALINK -->
<meta property="og:title" content="" id="metaTitle">
<meta property="og:description" content="" id="metaDesc">
<meta property="og:image" content="" id="metaImage">
<meta property="og:type" content="website">

<style>
:root {
    --cor-botao-som: #ff66c4;
    --cor-botao-voltar: #ff66c4;

    --btn-som-top: 40px;
    --btn-som-left: 25px;
    --btn-som-width: 50px;
    --btn-som-height: 50px;
    --btn-som-font: 22px;

    --btn-voltar-top: 40px;
    --btn-voltar-right: 25px;
    --btn-voltar-width: 50px;
    --btn-voltar-height: 50px;
    --btn-voltar-font: 22px;

    --area-max-width: 420px;
    --area-max-height: 750px;

    --btn1-bottom: 33%;
    --btn1-left: 26%;
    --btn1-width: 90px;
    --btn1-height: 90px;

    --btn2-bottom: 33%;
    --btn2-left: 56%;
    --btn2-width: 90px;
    --btn2-height: 90px;
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #000;
}

/* TELAS */
.page {
    position: fixed;
    width: 100%;
    height: 100dvh;
    display: none;
    justify-content: center;
    align-items: center;
}

.active {
    display: flex;
}

/* CONTAINER */
.media-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
}

/* IMAGEM */
.art-bg {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* ÁREA BASE DA ARTE */
.hotspot-area {
    position: absolute;
    width: 100%;
    height: 100%;
    max-width: var(--area-max-width);
    max-height: var(--area-max-height);
    aspect-ratio: 9 / 16;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* BOTÕES CLICÁVEIS */
.hotspot {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;

    /* =====================================================
       EDITAR AQUI TEMPORARIAMENTE
       USE VERMELHO ENQUANTO ALINHA
       DEPOIS VOLTE PARA transparent / none
    ===================================================== */
  background: rgba(255, 0, 0, 0.25);
border: 2px solid red;

    transition: transform 0.2s ease;
}

/* BOTÃO 1 - LOCALIZAÇÃO */
.btn1 {
    bottom: var(--btn1-bottom);
    left: var(--btn1-left);
    width: var(--btn1-width);
    height: var(--btn1-height);
}

/* BOTÃO 2 - PRESENTES */
.btn2 {
    bottom: var(--btn2-bottom);
    left: var(--btn2-left);
    width: var(--btn2-width);
    height: var(--btn2-height);
}

/* CLIQUE */
.hotspot:active {
    transform: scale(0.95);
}

/* BOTÃO SOM */
.btn-audio {
    position: fixed;
    top: var(--btn-som-top);
    left: var(--btn-som-left);
    width: var(--btn-som-width);
    height: var(--btn-som-height);
    background-color: var(--cor-botao-som);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 9999;
    border: none;
    font-size: var(--btn-som-font);
}

/* BOTÃO VOLTAR */
.btn-x {
    position: absolute;
    top: var(--btn-voltar-top);
    right: var(--btn-voltar-right);
    width: var(--btn-voltar-width);
    height: var(--btn-voltar-height);
    background-color: var(--cor-botao-voltar);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    font-size: var(--btn-voltar-font);
    z-index: 9999;
}

.btn-x:active {
    transform: scale(0.9);
}
</style>
</head>

<body ontouchstart="iniciarAudioAutomatico()" onclick="iniciarAudioAutomatico()">

<!-- ÁUDIO -->
<audio id="musica" loop playsinline>
    <source id="audioSource" src="" type="audio/mpeg">
</audio>

<button class="btn-audio" onclick="toggleAudio(event)" id="audioControl">🔊</button>

<!-- PÁGINA PRINCIPAL -->
<div id="principal" class="page active">
    <div class="media-wrapper">
        <img id="imgPrincipal" src="" class="art-bg" alt="Convite principal">

        <div class="hotspot-area">
            <!-- BOTÃO 1 - LOCALIZAÇÃO -->
            <div class="hotspot btn1"
            onclick="vibrar(); window.open(CONFIG.linkLocalizacao, '_blank')"></div>

            <!-- BOTÃO 2 - PRESENTES -->
            <div class="hotspot btn2"
            onclick="vibrar(); irParaSugestao()"></div>
        </div>
    </div>
</div>

<!-- PÁGINA DE PRESENTES -->
<div id="sugestao" class="page">
    <div class="media-wrapper">
        <img id="imgPresentes" src="" class="art-bg" alt="Sugestão de presentes">
        <button class="btn-x" onclick="irParaPrincipal()">✕</button>
    </div>
</div>

<script>
const audio = document.getElementById('musica');
const btnAudio = document.getElementById('audioControl');
let audioIniciado = false;

/* APLICAR CONFIGURAÇÃO */
function aplicarConfiguracao() {
    document.title = CONFIG.titulo;
    document.getElementById("pageTitle").textContent = CONFIG.titulo;

    document.getElementById("metaTitle").setAttribute("content", CONFIG.titulo);
    document.getElementById("metaDesc").setAttribute("content", CONFIG.descricao);
    document.getElementById("metaImage").setAttribute("content", CONFIG.capalink);

    document.getElementById("imgPrincipal").src = CONFIG.paginaPrincipal;
    document.getElementById("imgPresentes").src = CONFIG.paginaPresentes;
    document.getElementById("audioSource").src = CONFIG.audio;
    audio.load();

    document.documentElement.style.setProperty("--cor-botao-som", CONFIG.corBotaoSom);
    document.documentElement.style.setProperty("--cor-botao-voltar", CONFIG.corBotaoVoltar);

    document.documentElement.style.setProperty("--btn-som-top", CONFIG.botaoSom.top);
    document.documentElement.style.setProperty("--btn-som-left", CONFIG.botaoSom.left);
    document.documentElement.style.setProperty("--btn-som-width", CONFIG.botaoSom.width);
    document.documentElement.style.setProperty("--btn-som-height", CONFIG.botaoSom.height);
    document.documentElement.style.setProperty("--btn-som-font", CONFIG.botaoSom.fontSize);

    document.documentElement.style.setProperty("--btn-voltar-top", CONFIG.botaoVoltar.top);
    document.documentElement.style.setProperty("--btn-voltar-right", CONFIG.botaoVoltar.right);
    document.documentElement.style.setProperty("--btn-voltar-width", CONFIG.botaoVoltar.width);
    document.documentElement.style.setProperty("--btn-voltar-height", CONFIG.botaoVoltar.height);
    document.documentElement.style.setProperty("--btn-voltar-font", CONFIG.botaoVoltar.fontSize);

    document.documentElement.style.setProperty("--area-max-width", CONFIG.areaBase.maxWidth);
    document.documentElement.style.setProperty("--area-max-height", CONFIG.areaBase.maxHeight);

    document.documentElement.style.setProperty("--btn1-bottom", CONFIG.botao1.bottom);
    document.documentElement.style.setProperty("--btn1-left", CONFIG.botao1.left);
    document.documentElement.style.setProperty("--btn1-width", CONFIG.botao1.width);
    document.documentElement.style.setProperty("--btn1-height", CONFIG.botao1.height);

    document.documentElement.style.setProperty("--btn2-bottom", CONFIG.botao2.bottom);
    document.documentElement.style.setProperty("--btn2-left", CONFIG.botao2.left);
    document.documentElement.style.setProperty("--btn2-width", CONFIG.botao2.width);
    document.documentElement.style.setProperty("--btn2-height", CONFIG.botao2.height);
}

aplicarConfiguracao();

/* ÁUDIO */
function iniciarAudioAutomatico() {
    if (!audioIniciado) {
        audio.volume = CONFIG.volumeInicial;
        audio.play().catch(() => {});
        audioIniciado = true;
        btnAudio.innerHTML = "🔊";
    }
}

function toggleAudio(event) {
    event.stopPropagation();

    if (audio.paused) {
        audio.play().catch(() => {});
        btnAudio.innerHTML = "🔊";
    } else {
        audio.pause();
        btnAudio.innerHTML = "🔇";
    }
}

/* VIBRAÇÃO */
function vibrar() {
    if (navigator.vibrate) {
        navigator.vibrate([30, 50, 30]);
    }
}

/* NAVEGAÇÃO */
function irParaSugestao() {
    document.getElementById('principal').classList.remove('active');
    document.getElementById('sugestao').classList.add('active');
}

function irParaPrincipal() {
    document.getElementById('sugestao').classList.remove('active');
    document.getElementById('principal').classList.add('active');
}
</script>

</body>
</html>
