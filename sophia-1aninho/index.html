<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Convite Sophia - 1 Aninho</title>

<meta property="og:title" content="Convite Sophia - 1 Aninho">
<meta property="og:description" content="Toque para abrir o convite 💖">
<meta property="og:image" content="capalink.png">

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #000;
}

/* TELAS */
.page {
    position: fixed;
    width: 100%;
    height: 100dvh;
    display: none;
    justify-content: center;
    align-items: center;
}
.active { display: flex; }

/* CONTAINER */
.media-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
}

/* IMAGEM */
.art-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ÁREA DA ARTE */
.hotspot-area {
    position: absolute;
    width: 100%;
    height: 100%;
    max-width: 420px;
    max-height: 750px;
    aspect-ratio: 9 / 16;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* BOTÕES */
.hotspot {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;

    /* ATIVAR PARA AJUSTAR */
    background: rgba(255,0,0,0.25);
    border: 2px solid red;
}

.hotspot:active {
    transform: scale(0.95);
}

/* BOTÃO 1 - LOCALIZAÇÃO */
.btn1 {
    bottom: 33%;
    left: 14%;
    width: 90px;
    height: 90px;
}

/* BOTÃO 2 - PRESENTES */
.btn2 {
    bottom: 33%;
    left: %;
    width: 90px;
    height: 90px;
}

/* BOTÃO SOM */
.btn-audio {
    position: fixed;
    top: 40px;
    left: 25px;
    width: 50px;
    height: 50px;
    background: #ff66c4;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    border: none;
    z-index: 9999;
}

/* BOTÃO VOLTAR */
.btn-x {
    position: absolute;
    top: 40px;
    right: 25px;
    width: 50px;
    height: 50px;
    background: #ff66c4;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    border: none;
    z-index: 9999;
}
</style>
</head>

<body ontouchstart="iniciarAudio()" onclick="iniciarAudio()">

<audio id="musica" loop playsinline>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<button class="btn-audio" onclick="toggleAudio(event)" id="audioBtn">🔊</button>

<!-- PRINCIPAL -->
<div id="principal" class="page active">
    <div class="media-wrapper">

        <img src="pagina.png" class="art-bg" alt="Convite principal">

        <div class="hotspot-area">

            <!-- LOCALIZAÇÃO -->
            <div class="hotspot btn1"
            onclick="window.open('https://maps.app.goo.gl/SEU_LINK_AQUI', '_blank')"></div>

            <!-- PRESENTES -->
            <div class="hotspot btn2"
            onclick="irSugestao()"></div>

        </div>
    </div>
</div>

<!-- PRESENTES -->
<div id="sugestao" class="page">
    <div class="media-wrapper">
        <img src="pagina2.png" class="art-bg" alt="Sugestão de presentes">
        <button class="btn-x" onclick="voltar()">✕</button>
    </div>
</div>

<script>
const audio = document.getElementById("musica");
const audioBtn = document.getElementById("audioBtn");
let iniciou = false;

function iniciarAudio() {
    if (!iniciou) {
        audio.volume = 0.6;
        audio.play().catch(()=>{});
        iniciou = true;
        audioBtn.innerHTML = "🔊";
    }
}

function toggleAudio(e) {
    e.stopPropagation();

    if (audio.paused) {
        audio.play().catch(()=>{});
        audioBtn.innerHTML = "🔊";
    } else {
        audio.pause();
        audioBtn.innerHTML = "🔇";
    }
}

function irSugestao() {
    document.getElementById("principal").classList.remove("active");
    document.getElementById("sugestao").classList.add("active");
}

function voltar() {
    document.getElementById("sugestao").classList.remove("active");
    document.getElementById("principal").classList.add("active");
}
</script>

</body>
</html>
