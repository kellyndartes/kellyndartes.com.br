<script>
    const mu=document.getElementById('m'), btn=document.getElementById('btn-s'), sk=document.getElementById('skip'), tm=document.getElementById('timer-wrapper');
    const hasP2 = true, hasP3 = true;
    let lastPg = 1, iniciado = false, currentZap = "";
    
    function s(el){ 
        if(iniciado) return; iniciado = true;
        if(el && el.tagName === 'DIV') el.removeAttribute('onclick');
        
        mu.load(); 
        mu.play().catch(()=>{}); 
        
        const vAct = document.querySelector('.page.active video');
        if(vAct) { vAct.muted = false; vAct.play().catch(()=>{}); }
        
        btn.style.display='flex'; 
        if (hasP2) { 
            if("nao"==='sim' && hasP3) sk.style.display='block'; 
            g(2); 
            const v2=document.getElementById('v2'); 
            if(v2 && v2.tagName==='VIDEO'){ v2.play().catch(()=>{}); v2.onended=()=> { if(hasP3) g(3); } }
            else if(hasP3) { setTimeout(()=>g(3),4000); } 
        } else {
            const v1=document.getElementById('v1'); 
            if(v1) { v1.muted = false; v1.play().catch(()=>{}); }
        }
    }
    
    function g(n){ 
        if(n <= 3) lastPg = n; 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if(n==3 || (!hasP3 && n==2) || (!hasP2 && n==1) || n > 3) sk.style.display='none';
        else if ("nao"==='sim' && hasP3 && n < 3) sk.style.display='block';
        tm.style.display = ("sim"==='sim' && n=="4") ? 'block' : 'none';
        const t=document.getElementById('pg'+n); 
        if(t){
            t.classList.add('active'); 
            const v=t.querySelector('video'); 
            if(v) { if(iniciado) v.muted = false; v.play().catch(()=>{}); }
        }
